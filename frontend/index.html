<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报修图片智能分析系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 报修图片智能分析系统</h1>
            <p class="subtitle">基于通义千问 AI 的多模态图像识别</p>
        </header>

        <main>
            <!-- 左侧：上传和预览 -->
            <div class="left-panel">
                <!-- 上传区域 -->
                <section class="upload-section">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-icon">📸</div>
                        <p class="upload-text">点击或拖拽图片到此处上传</p>
                        <p class="upload-hint">支持 JPEG, PNG, WebP, GIF, BMP, TIFF</p>
                        <input type="file" id="fileInput" accept="image/*" hidden>
                    </div>

                    <button class="btn btn-primary" id="analyzeBtn" disabled>
                        <span id="btnText">开始分析</span>
                        <span id="btnLoader" class="loader" hidden></span>
                    </button>
                </section>

                <!-- 图片预览 -->
                <section class="preview-section" id="previewSection" hidden>
                    <h2>图片预览</h2>
                    <div class="preview-container">
                        <img id="previewImage" alt="预览图片">
                        <button class="btn-close" id="clearBtn">✕</button>
                    </div>
                </section>
            </div>

            <!-- 右侧：分析结果 -->
            <div class="right-panel">
                <!-- 分析结果 -->
                <section class="result-section" id="resultSection" hidden>
                    <h2>分析结果</h2>
                    <div class="result-container" id="resultContainer">
                        <!-- 结果将动态插入这里 -->
                    </div>
                </section>

                <!-- 错误提示 -->
                <section class="error-section" id="errorSection" hidden>
                    <div class="error-container">
                        <div class="error-icon">⚠️</div>
                        <h3>分析失败</h3>
                        <p id="errorMessage"></p>
                        <button class="btn btn-secondary" id="retryBtn">重新尝试</button>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>Powered by Qwen3.5-Omni-Flash | <a href="http://localhost:8000/docs" target="_blank">API 文档</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
